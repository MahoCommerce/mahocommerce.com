site_name: Maho - open source on-premises ecommerce platform
site_url: https://mahocommerce.com
site_description: 'robust, modern, and lean on-premises ecommerce platform for the future of your business'
repo_url: https://github.com/MahoCommerce/maho
repo_name: MahoCommerce/maho

theme:
  name: materialx
  logo: assets/maho-logo-white.svg
  favicon: assets/maho-symbol.svg
  custom_dir: docs/overrides
  font: false
  palette:
      scheme: default
      primary: black
      accent: '#ADB41A'
  features:
    - instant
    - content.code.copy
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
extra_css:
  - maho.css
extra_javascript:
  - maho.js
  - https://cdn.jsdelivr.net/npm/party-js@latest/bundle/party.min.js

plugins:
  - search
  - social:
      cards_layout_options:
        logo: docs/assets/maho-logo.svg
        background_color: "#d7df22"
  - awesome-pages
  - blog:
      blog_dir: blog
      post_date_format: full
      post_url_format: "{date}/{slug}"
      categories_allowed:
        - Release announcement
        - Feature spotlight
        - Development log
        - Events
        - Engineering
  - minify:
      minify_html: true
  - redirects:
      redirect_maps:
        ai.md: user-guide/ai.md
        array-import-adapter.md: developer/array-import-adapter.md
        autoloaders.md: developer/autoloaders.md
        category-import-export.md: user-guide/category-import-export.md
        cli-tool.md: developer/cli-tool.md
        code-reference.md: api/code-reference.md
        composer-plugin.md: developer/composer-plugin.md
        cron.md: hosting/cron.md
        customer-segments.md: user-guide/customer-segments.md
        database-layer.md: developer/database-layer.md
        date-handling.md: developer/date-handling.md
        declarative-database-schema.md: developer/declarative-database-schema.md
        deepwiki.md: api/deepwiki.md
        demo.md: about/demo.md
        differences.md: about/differences.md
        edge-caching.md: hosting/edge-caching.md
        email-automation.md: user-guide/email-automation.md
        email-sending-configuration.md: hosting/email-sending-configuration.md
        feed-manager.md: user-guide/feed-manager.md
        frankenphp.md: hosting/frankenphp.md
        getting-started.md: about/getting-started.md
        gift-cards.md: user-guide/gift-cards.md
        icons-library.md: developer/icons-library.md
        language-packs.md: developer/language-packs.md
        logging.md: hosting/logging.md
        magic-link-authentication.md: user-guide/magic-link-authentication.md
        maho-for-devs/advanced-orm.md: developer/guide/advanced-orm.md
        maho-for-devs/config.md: developer/guide/config.md
        maho-for-devs/controller-dispatch.md: developer/guide/controller-dispatch.md
        maho-for-devs/customer-segments.md: developer/guide/customer-segments.md
        maho-for-devs/data-collections.md: developer/guide/data-collections.md
        maho-for-devs/email-automation.md: developer/guide/email-automation.md
        maho-for-devs/gift-cards.md: developer/guide/gift-cards.md
        maho-for-devs/introduction.md: developer/guide/introduction.md
        maho-for-devs/javascript-defer.md: developer/guide/javascript-defer.md
        maho-for-devs/layout-blocks-templates.md: developer/guide/layout-blocks-templates.md
        maho-for-devs/models-and-orm.md: developer/guide/models-and-orm.md
        maho-for-devs/setup-resources.md: developer/guide/setup-resources.md
        maintenance-mode.md: hosting/maintenance-mode.md
        migrate-to-maho.md: about/migrate-to-maho.md
        observers.md: developer/observers.md
        origins.md: about/origins.md
        override-configurations.md: developer/override-configurations.md
        product-relationship-rules.md: user-guide/product-relationship-rules.md
        product-types.md: user-guide/product-types.md
        redis.md: hosting/redis.md
        release-strategy.md: about/release-strategy.md
        revocation-button.md: user-guide/revocation-button.md
        roadmap.md: about/roadmap.md
        robotstxt.md: hosting/robotstxt.md
        routing.md: developer/routing.md
        sboms.md: about/sboms.md
        seo.md: user-guide/seo.md
        shipping-bridge.md: user-guide/shipping-bridge.md
        svg-support.md: hosting/svg-support.md
        theme-development.md: developer/theme-development.md

validation:
  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_style: github-dark
      noclasses: true
      extend_pygments_lang:
        - name: php
          lang: php
          options:
            startinline: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - footnotes

