name: Upgrade dependencies

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.SYNC_L10N_APP_CLIENT_ID }}
          private-key: ${{ secrets.SYNC_L10N_APP_PRIVATE_KEY }}
          owner: MahoCommerce

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.generate_token.outputs.token }}

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Upgrade requirements.txt with pur
        run: |
          pip install pur
          pur -r requirements.txt

      - name: Install upgraded dependencies
        run: pip install -r requirements.txt

      - name: Verify build
        run: mkdocs build

      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          if git diff --quiet requirements.txt; then
            echo "No dependency changes."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git checkout -B chore/upgrade-deps
          git add requirements.txt
          git commit -m "chore: upgrade python dependencies"
          git push -f origin chore/upgrade-deps
          gh pr create \
            --title "chore: upgrade python dependencies" \
            --body "Automated dependency upgrade via \`pur\`. \`mkdocs build\` passed in CI." \
            --head chore/upgrade-deps \
            --base main || true
